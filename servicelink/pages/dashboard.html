<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | ServiceLink</title>
  <link rel="stylesheet" href="../css/main.css?v=stitch-refresh-3">
</head>
<body>
  <div data-app-nav></div>
  <main class="app-shell">
    <section class="container stack-lg" id="user-dashboard">
      <div class="hero-panel" data-reveal>
        <div>
          <span class="page-kicker">Dashboard</span>
          <h1 class="page-title mt-3">Hello, <span data-current-user>Guest</span>.</h1>
          <p class="page-lede mt-4">Track active bookings, review pending requests, and keep your profile ready for checkout.</p>
          <div class="hero-actions mt-5">
            <a class="btn btn-primary" href="workers.html">Book Now</a>
            <a class="btn btn-secondary" href="profile.html">Edit Profile</a>
          </div>
        </div>
      </div>

      <div id="dashboard-kpis" class="product-grid"></div>

      <section class="dashboard-section">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <h2 class="font-display text-2xl font-bold">Active bookings</h2>
          <a class="btn btn-secondary btn-sm" href="tools.html">Rent</a>
        </div>
        <div id="active-bookings" class="stack"></div>
      </section>

      <section class="dashboard-section">
        <h2 class="font-display text-2xl font-bold">Past bookings</h2>
        <div id="past-bookings" class="stack"></div>
      </section>
    </section>
  </main>

  <script src="../js/app-state.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/page-common.js"></script>
  <script>
    if (!AppState.isLoggedIn()) {
      location.href = `login.html?redirect=${encodeURIComponent(location.href)}`;
    }
  </script>
  <script src="../js/user-flow.js"></script>
</body>
</html>
