<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search | ServiceLink</title>
  <link rel="stylesheet" href="../css/main.css?v=stitch-refresh-3">
</head>
<body>
  <div data-app-nav></div>
  <main class="app-shell">
    <section class="container stack-lg">
      <div class="hero-panel">
        <div>
          <span class="page-kicker">Search</span>
          <h1 class="page-title mt-3">Find workers and tools.</h1>
          <p class="page-lede mt-4">Search the whole marketplace from one place.</p>
        </div>
        <div class="form-row">
          <input id="global-search" class="input input-search" placeholder="Electrician, drill, cleaning">
          <select id="search-type" class="input">
            <option value="all">All</option>
            <option value="service">Services</option>
            <option value="tool">Tools</option>
          </select>
          <input id="search-location" class="input" placeholder="Location">
          <select id="search-rating" class="input"><option value="0">Any rating</option><option value="4.5">4.5+</option></select>
          <select id="search-price" class="input"><option value="10000">Any price</option><option value="500">Under ₹500</option><option value="900">Under ₹900</option></select>
        </div>
      </div>
      <div class="flex flex-wrap items-center justify-between gap-3">
        <h2 class="font-display text-2xl font-bold">Results</h2>
        <span id="search-count" class="badge badge-info">Loading</span>
      </div>
      <div id="search-results" class="stack"></div>
    </section>
  </main>
  <script src="../js/app-state.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/page-common.js"></script>
  <script src="../js/user-flow.js"></script>
</body>
</html>
