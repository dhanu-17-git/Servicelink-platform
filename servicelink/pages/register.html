<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | ServiceLink</title>
  <link rel="stylesheet" href="../css/main.css?v=stitch-refresh-3">
</head>
<body>
  <div data-app-nav></div>
  <main class="app-shell">
    <section class="container">
      <div class="app-card auth-card p-6 sm:p-8 stack-lg" data-reveal>
        <div>
          <span class="page-kicker">Register</span>
          <h1 class="font-display text-4xl font-bold mt-3">Create your account.</h1>
          <p class="page-lede mt-3">Your profile details are used to protect booking quality and reduce checkout friction.</p>
        </div>
        <form id="register-form" class="stack">
          <div>
            <label class="form-label">Name</label>
            <input class="input" name="name" placeholder="Full name" required>
          </div>
          <div>
            <label class="form-label">Email</label>
            <input class="input" name="email" type="email" placeholder="you@example.com" required>
          </div>
          <div>
            <label class="form-label">Phone</label>
            <input class="input" name="phone" placeholder="+91 98765 43210" required>
          </div>
          <div>
            <label class="form-label">Password</label>
            <input class="input" name="password" type="password" placeholder="8 characters with uppercase and number" required>
          </div>
          <button class="btn btn-primary btn-lg" type="submit">Register</button>
        </form>
        <p class="page-lede">Already registered? <a class="font-bold" style="color:var(--primary)" href="login.html">Login</a></p>
      </div>
    </section>
  </main>

  <script src="../js/app-state.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/page-common.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', function (event) {
      event.preventDefault();
      const form = event.currentTarget;
      const result = Validator.validateForm(form, {
        name: ['required', 'minLength:2'],
        email: ['required', 'email'],
        phone: ['required', 'phone'],
        password: ['required', 'password']
      });
      if (!result.isValid) return;
      const user = {
        id: `user_${Date.now().toString(36)}`,
        name: form.name.value.trim(),
        email: form.email.value.trim(),
        phone: form.phone.value.trim(),
        role: 'user',
        avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(form.email.value.trim())}`
      };
      AppState.setUser(user);
      AppState.saveProfile({
        fullName: user.name,
        phone: user.phone,
        email: user.email,
        address: '',
        city: '',
        pincode: ''
      });
      const redirect = new URLSearchParams(location.search).get('redirect') || 'profile.html';
      location.href = redirect.includes('booking.html') ? `profile.html?redirect=${encodeURIComponent(redirect)}` : redirect;
    });
  </script>
</body>
</html>
