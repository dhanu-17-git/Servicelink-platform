<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | ServiceLink</title>
  <link rel="stylesheet" href="../css/main.css?v=stitch-refresh-3">
</head>
<body>
  <div data-app-nav></div>
  <main class="app-shell">
    <section class="container">
      <div class="app-card auth-card p-6 sm:p-8 stack-lg" data-reveal>
        <div>
          <span class="page-kicker">Login</span>
          <h1 class="font-display text-4xl font-bold mt-3">Welcome back.</h1>
          <p class="page-lede mt-3">Use any valid email and password with at least 6 characters for this local prototype.</p>
        </div>
        <form id="login-form" class="stack">
          <div>
            <label class="form-label">Email</label>
            <input class="input" name="email" type="email" placeholder="you@example.com" required>
          </div>
          <div>
            <label class="form-label">Password</label>
            <input class="input" name="password" type="password" placeholder="Minimum 6 characters" required minlength="6">
          </div>
          <button class="btn btn-primary btn-lg" type="submit" data-original-text="Login">Login</button>
        </form>
        <p class="page-lede">New here? <a class="font-bold" style="color:var(--primary)" href="register.html">Create an account</a></p>
      </div>
    </section>
  </main>

  <script src="../js/app-state.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/page-common.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', function (event) {
      event.preventDefault();
      const form = event.currentTarget;
      const result = Validator.validateForm(form, { email: ['required', 'email'], password: ['required', 'minLength:6'] });
      if (!result.isValid) return;
      const email = form.email.value.trim();
      const name = email.split('@')[0].replace(/[._-]+/g, ' ').replace(/\b\w/g, (c) => c.toUpperCase());
      AppState.setUser({
        id: `user_${Date.now().toString(36)}`,
        name,
        email,
        role: 'user',
        avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(email)}`
      });
      const redirect = new URLSearchParams(location.search).get('redirect') || 'profile.html';
      location.href = redirect;
    });
  </script>
</body>
</html>
