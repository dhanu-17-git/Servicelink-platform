name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: servicelink_backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Lock backend dependencies
        run: uv lock

      - name: Sync backend dependencies
        run: uv sync --frozen --no-dev

      - name: Django checks
        env:
          SECRET_KEY: ci-secret-key
          DEBUG: "False"
          DATABASE_URL: mysql+pymysql://root:password@127.0.0.1:3306/servicelink
          MYSQL_DATABASE: servicelink
          MYSQL_USER: root
          MYSQL_PASSWORD: password
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: "3306"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: uv run python manage.py check

      - name: Django tests
        env:
          SECRET_KEY: ci-secret-key
          DEBUG: "False"
          DATABASE_URL: sqlite:///tmp/ci.sqlite3
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: uv run python manage.py test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: servicelink_frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: servicelink_frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000/api/
        run: npm run build
